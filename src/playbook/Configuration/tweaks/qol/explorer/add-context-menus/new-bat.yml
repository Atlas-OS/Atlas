---
title: Adds Batch Scripts to 'New' Context Menu
description: Adds batch scripts (.bat) to 'New' context menu
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKCR\.bat\ShellNew'; Value = 'ItemName'; Data = '%windir%\System32\acppage.dll,-6002'; Type = 'REG_EXPAND_SZ' },
        @{ Path = 'HKCR\.bat\ShellNew'; Value = 'NullFile'; Data = ''; Type = 'REG_SZ' }
      )
    wait: true
