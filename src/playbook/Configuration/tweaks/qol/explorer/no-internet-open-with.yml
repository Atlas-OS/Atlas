---
title: Disable Internet File Association Service
description: Makes it so that Windows does not ask you if you want to get results from the web for an unknown file extension
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'; Value = 'NoInternetOpenWith'; Data = '1'; Type = 'REG_DWORD' }
      )
    wait: true
