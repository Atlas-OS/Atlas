---
title: Minimize Mouse Hover Time for Item Info
description: Minimizes mouse hover time (from 400 ms to 20 ms) for hovering over files or folders mostly in File Explorer, so that you can instantly see information for QoL
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKCU\Control Panel\Desktop'; Value = 'MouseHoverTime'; Data = '20'; Type = 'REG_SZ' }
      )
    wait: true

