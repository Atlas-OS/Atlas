---
title: Remove 'Cast to device' from Context Menu
description: Removes 'Cast to device' from Context Menu
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Shell Extensions\Blocked'; Value = '{7AD84985-87B4-4a16-BE58-8B72A5B390F7}'; Data = ''; Type = 'REG_SZ' }
      )
    wait: true
