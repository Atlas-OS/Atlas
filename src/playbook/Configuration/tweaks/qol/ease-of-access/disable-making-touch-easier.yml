---
title: Disable Accessibility Tool Shortcut
description: Disables the accessibility tool shortcut that launches with Win+Vol, which is also labeled as making touch and tablets easier to use, for QoL
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKCU\Control Panel\Accessibility\SlateLaunch'; Value = 'LaunchAT'; Data = '0'; Type = 'REG_DWORD' }
      )
    wait: true
