---
title: Set Hidden Pages
description: Hides Settings pages that are either broken or unused
actions:
    # https://learn.microsoft.com/en-us/windows/uwp/launch-resume/launch-settings-app

    # Windows 10
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'; Value = 'SettingsPageVisibility'; Data = 'hide:recovery;maps;maps-downloadmaps;privacy;privacy-speechtyping;privacy-speech;privacy-feedback;privacy-activityhistory;search-permissions;privacy-general;sync;mobile-devices;mobile-devices-addphone;workplace;backup'; Type = 'REG_SZ' }
      )
    wait: true
    builds: [ '<22000' ]

    # Windows 11
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'; Value = 'SettingsPageVisibility'; Data = 'hide:recovery;maps;maps-downloadmaps;privacy;privacy-feedback;privacy-activityhistory;search-permissions;privacy-general;sync;mobile-devices;mobile-devices-addphone;workplace;family-group;deviceusage;home'; Type = 'REG_SZ' }
      )
    wait: true
    builds: [ '>=22000' ]
