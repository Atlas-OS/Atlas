---
title: Disable Delivery Optimization
description: Disables Delivery Optimization to make sure that no bandwidth is used in the background for peer-to-peer Windows Updates
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SOFTWARE\Policies\Microsoft\Windows\DeliveryOptimization'; Value = 'DODownloadMode'; Data = '0'; Type = 'REG_DWORD' }
      )
    wait: true
