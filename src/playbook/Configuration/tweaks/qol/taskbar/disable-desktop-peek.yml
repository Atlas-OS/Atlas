---
title: Disable Show Desktop Peek on Taskbar
description: Disables the 'Show Desktop' peek feature on the taskbar, as most of the time people accidentally trigger it, so it is disabled here for QoL
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Advanced'; Value = 'DisablePreviewDesktop'; Data = '1'; Type = 'REG_DWORD' }
      )
    wait: true
