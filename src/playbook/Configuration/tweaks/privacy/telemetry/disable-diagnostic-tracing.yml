---
title: Disable Diagnostic Tracing
description: Disables diagnostic tracing (system activities, events or errors) for privacy reasons
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SYSTEM\CurrentControlSet\Control\Diagnostics\Performance'; Value = 'DisableDiagnosticTracing'; Data = '1'; Type = 'REG_DWORD' }
      )
    wait: true
