---
title: Disable Website Access to Language List
description: Disables websites accessing the Windows language list for the best privacy, as it is a common fingerprinting technique to identify a user by their languages
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKCU\Control Panel\International\User Profile'; Value = 'HttpAcceptLanguageOptOut'; Data = '1'; Type = 'REG_DWORD' }
      )
    wait: true
    
    
