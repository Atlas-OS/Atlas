---
title: Disallow Upload and Publish of User Activities
description: Disables the upload and publish of user activities for privacy
actions:
  - !powerShell:
    command: |
      . "$env:windir\AtlasModules\Scripts\regHelp.ps1" -RegistryObjects @(
        @{ Path = 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System'; Value = 'UploadUserActivities'; Data = '0'; Type = 'REG_DWORD' },
        @{ Path = 'HKLM\SOFTWARE\Policies\Microsoft\Windows\System'; Value = 'PublishUserActivities'; Data = '0'; Type = 'REG_DWORD' }
      )
    wait: true
